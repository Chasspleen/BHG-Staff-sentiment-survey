<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BHG Staff Sentiment Survey</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-light: #E1F5EE;
      --text-primary: #1a1a1a;
      --text-secondary: #555;
      --text-tertiary: #999;
      --border: #e0e0e0;
      --border-mid: #c8c8c8;
      --bg: #ffffff;
      --bg-secondary: #f7f7f5;
      --amber: #BA7517;
      --radius: 10px;
      --radius-sm: 6px;
    }

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .shell {
      max-width: 620px;
      margin: 0 auto;
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .site-header .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-primary);
    }
    .site-header .divider {
      height: 16px;
      width: 1px;
      background: var(--border);
    }
    .site-header .subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    /* Card */
    .card {
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 2rem;
    }

    /* Progress */
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 1.75rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 3px;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Section header */
    .sec-label {
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.3rem;
    }
    .sec-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }
    .sec-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    /* Info box */
    .info-box {
      background: var(--green-light);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 13px;
      color: #0F6E56;
      margin-bottom: 1.75rem;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.55;
    }
    .info-box svg { flex-shrink: 0; margin-top: 1px; }

    /* Question block */
    .q-block {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .q-block:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .q-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }
    .q-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    /* Scale */
    .scale-row { display: flex; gap: 6px; }
    .scale-btn {
      flex: 1;
      padding: 9px 4px;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.14s;
      font-family: inherit;
    }
    .scale-btn:hover { background: var(--bg-secondary); border-color: var(--green); }
    .scale-btn.sel { background: var(--green); border-color: var(--green); color: #fff; }
    .scale-labels { display: flex; justify-content: space-between; margin-top: 6px; }
    .scale-labels span { font-size: 11px; color: var(--text-tertiary); }

    /* Single / multi choice */
    .choice-list { display: flex; flex-direction: column; gap: 8px; }
    .choice-btn {
      padding: 10px 14px;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.14s;
      font-family: inherit;
    }
    .choice-btn:hover { background: var(--bg-secondary); }
    .choice-btn.sel { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }

    /* Badge multi-select */
    .badge-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .badge {
      display: inline-block;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.14s;
      user-select: none;
    }
    .badge:hover { border-color: var(--green); color: var(--green-dark); }
    .badge.sel { background: var(--green-light); border-color: var(--green); color: var(--green-dark); font-weight: 500; }

    /* Text inputs */
    textarea, input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg);
      line-height: 1.5;
      transition: border-color 0.14s;
    }
    textarea { resize: vertical; min-height: 90px; }
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
    }

    /* Nav */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .btn-back {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-secondary);
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.14s;
    }
    .btn-back:hover { background: var(--bg-secondary); }
    .btn-next {
      background: var(--green);
      border: none;
      color: #fff;
      padding: 10px 26px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.14s;
    }
    .btn-next:hover { background: var(--green-dark); }
    .btn-next:disabled { background: var(--border); cursor: default; }

    /* Name toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 4px 0;
      user-select: none;
    }
    .toggle-track {
      width: 42px;
      height: 24px;
      background: var(--border-mid);
      border-radius: 12px;
      transition: background 0.2s;
      flex-shrink: 0;
      position: relative;
    }
    .toggle-track.on { background: var(--green); }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-track.on .toggle-thumb { left: 21px; }
    .toggle-label { font-size: 14px; color: var(--text-primary); }
    .name-fields { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .name-warn {
      font-size: 12px;
      color: var(--amber);
      margin-top: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* Submitting state */
    .submitting-msg {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Done */
    .done-wrap { text-align: center; padding: 2.5rem 1rem; }
    .done-icon { font-size: 48px; margin-bottom: 1rem; }
    .done-title { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem; }
    .done-sub { font-size: 15px; color: var(--text-secondary); line-height: 1.7; }

    /* Error */
    .error-box {
      background: #FFF0F0;
      border: 1px solid #F09595;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 13px;
      color: #A32D2D;
      margin-top: 1rem;
      display: none;
    }
    .error-box.show { display: block; }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem; }
      .scale-btn { font-size: 12px; padding: 8px 2px; }
    }
  </style>
</head>
<body>

<div class="shell">
  <header class="site-header">
    <span class="logo">BHG</span>
    <span class="divider"></span>
    <span class="subtitle">Staff Survey — Confidential</span>
  </header>

  <div class="card">
    <div id="app"></div>
  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  // Paste your Google Apps Script Web App URL here after deploying the script
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-3JOvU_cEl2Y9s5lJXBBhhFgW_i1mxmEs8QDtJ_-3NlbgMkMhQbSYzCnLrQ6hwhsH/exec";
  const SURVEY_ROUND = "Q3 2026"; // ← update each quarter before pushing
  // ──────────────────────────────────────────────────────────────────────────

  const sections = [
    {
      id: "intro",
      label: "Welcome",
      title: "BHG Staff Sentiment Survey",
      desc: "This takes about 8–10 minutes. Your responses are reviewed in aggregate by group leadership — no individual response is ever attributed to you unless you choose to leave your name at the end.",
      questions: [
        {
          id: "venue", type: "multi",
          text: "Which venue do you work at?",
          note: "Select all that apply.",
          options: ["Masonry Canggu","Masonry Uluwatu","The Backroom","Bar Vera","Chop House"]
        },
        {
          id: "role_type", type: "single",
          text: "Which best describes your role?",
          options: ["Front of house (service, bar, host)","Back of house (kitchen, prep)","Management / supervisor","Events / admin","Other"]
        },
        {
          id: "tenure", type: "single",
          text: "How long have you been with BHG?",
          options: ["Less than 3 months","3–6 months","6–12 months","1–2 years","More than 2 years"]
        }
      ]
    },
    {
      id: "role",
      label: "Day-to-day",
      title: "Day-to-day experience",
      desc: "Questions about your work, your responsibilities, and how clear things feel.",
      questions: [
        { id: "role_clarity", type: "scale", text: "I understand what is expected of me in my role.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "workload", type: "scale", text: "My workload feels manageable.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "tools", type: "scale", text: "I have the tools, training, and resources I need to do my job well.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "pride", type: "scale", text: "I feel proud of the work I do here.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "role_open", type: "text", text: "Anything about your role or daily setup that could be improved?", placeholder: "Optional" }
      ]
    },
    {
      id: "team",
      label: "Team & culture",
      title: "Team & workplace culture",
      desc: "How the team works together and how the venue feels to be part of.",
      questions: [
        { id: "peer_support", type: "scale", text: "My colleagues support me when things get busy.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "respect", type: "scale", text: "People treat each other with respect at my venue.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "belonging", type: "scale", text: "I feel like I belong here and am a valued part of the team.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "comms", type: "scale", text: "Important information — schedule changes, events, updates — reaches me on time.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "team_open", type: "text", text: "Anything about the team culture you'd like us to know?", placeholder: "Optional" }
      ]
    },
    {
      id: "management",
      label: "Leadership",
      title: "Management & leadership",
      desc: "How you experience supervision and leadership at your venue.",
      questions: [
        { id: "mgmt_support", type: "scale", text: "My direct supervisor supports me and helps me do my job well.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "mgmt_fair", type: "scale", text: "I am treated fairly by management.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "feedback", type: "scale", text: "I receive useful feedback that helps me improve.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "voice", type: "scale", text: "I feel comfortable raising concerns or suggestions with my supervisor.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "mgmt_open", type: "text", text: "Anything about how the team is managed that could work better?", placeholder: "Optional" }
      ]
    },
    {
      id: "growth",
      label: "Growth",
      title: "Growth & recognition",
      desc: "Whether your contribution is recognised and your development is supported.",
      questions: [
        { id: "recognition", type: "scale", text: "When I do good work, it gets noticed.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "development", type: "scale", text: "I have opportunities to grow and develop in my role.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "pay", type: "scale", text: "I feel fairly compensated for what I do.", low: "Strongly disagree", high: "Strongly agree" },
        { id: "retention", type: "single", text: "How likely are you to still be working with BHG in 12 months?", options: ["Very likely","Likely","Unsure","Unlikely","Very unlikely"] },
        { id: "growth_open", type: "text", text: "What would make you more likely to stay and grow with BHG?", placeholder: "Optional" }
      ]
    },
    {
      id: "overall",
      label: "Overall",
      title: "Overall experience",
      desc: "A few final questions to capture the big picture.",
      questions: [
        { id: "nps", type: "scale", text: "How likely are you to recommend BHG as a place to work to a friend?", low: "Not at all likely", high: "Extremely likely", max: 10 },
        { id: "morale", type: "single", text: "How would you describe morale at your venue right now?", options: ["Very positive","Generally positive","Mixed","Generally low","Very low"] },
        { id: "strength", type: "text", text: "What is the single biggest strength of working at BHG?", placeholder: "Be specific if you can" },
        { id: "fix", type: "text", text: "What is the one thing you most want leadership to fix or improve?", placeholder: "Be direct — this is anonymous" }
      ]
    },
    {
      id: "identity",
      label: "Your name",
      title: "Would you like to put your name to this?",
      desc: "Entirely optional. If you leave your name, your response will no longer be anonymous — leadership will see your answers alongside your name. There is no expectation either way.",
      questions: []
    }
  ];

  let cur = 0;
  let answers = {};
  let nameOn = false;
  let submitting = false;

  const TOTAL = sections.length;

  function pct() { return Math.round((cur / (TOTAL - 1)) * 100); }

  function render() {
    const el = document.getElementById("app");
    if (cur >= TOTAL) { el.innerHTML = renderDone(); return; }
    const sec = sections[cur];
    if (sec.id === "identity") { el.innerHTML = renderIdentity(); return; }

    const topNote = sec.id === "intro" ? `
      <div class="info-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>Responses are fully anonymous by default. Only aggregated results are seen by leadership — unless you choose to leave your name at the end.</span>
      </div>` : "";

    const qHtml = sec.questions.map(q => renderQ(q)).join("");

    el.innerHTML = `
      <div class="progress-track"><div class="progress-fill" style="width:${pct()}%"></div></div>
      <div class="sec-label">${sec.label} &bull; ${cur + 1} of ${TOTAL}</div>
      <div class="sec-title">${sec.title}</div>
      <div class="sec-desc">${sec.desc}</div>
      ${topNote}${qHtml}
      <div class="nav-row">
        ${cur > 0
          ? `<button class="btn-back" onclick="go(-1)">&#8592; Back</button>`
          : `<span></span>`}
        <button class="btn-next" onclick="go(1)">
          ${cur === TOTAL - 2 ? "Review &amp; submit" : "Continue"} &#8594;
        </button>
      </div>`;
  }

  function renderQ(q) {
    const val = answers[q.id];
    if (q.type === "scale") {
      const max = q.max || 5;
      const btns = Array.from({ length: max }, (_, i) => i + 1)
        .map(n => `<button class="scale-btn${val == n ? " sel" : ""}" data-action="single" data-id="${q.id}" data-val="${n}">${n}</button>`)
        .join("");
      return `
        <div class="q-block">
          <div class="q-text">${q.text}</div>
          <div class="scale-row">${btns}</div>
          <div class="scale-labels"><span>${q.low}</span><span>${q.high}</span></div>
        </div>`;
    }
    if (q.type === "single") {
      const opts = q.options.map(o =>
        `<button class="choice-btn${val === o ? " sel" : ""}" data-action="single" data-id="${q.id}" data-val="${o.replace(/"/g,'&quot;')}">${o}</button>`
      ).join("");
      return `
        <div class="q-block">
          <div class="q-text">${q.text}</div>
          <div class="choice-list">${opts}</div>
        </div>`;
    }
    if (q.type === "multi") {
      const valArr = val || [];
      const badges = q.options.map(o =>
        `<span class="badge${valArr.includes(o) ? " sel" : ""}" data-action="multi" data-id="${q.id}" data-val="${o.replace(/"/g,'&quot;')}">${o}</span>`
      ).join("");
      return `
        <div class="q-block">
          <div class="q-text">${q.text}</div>
          ${q.note ? `<div class="q-sub">${q.note}</div>` : ""}
          <div class="badge-wrap">${badges}</div>
        </div>`;
    }
    if (q.type === "text") {
      return `
        <div class="q-block">
          <div class="q-text">${q.text}</div>
          <textarea placeholder="${q.placeholder || ""}" oninput="setA('${q.id}',this.value)">${escHtml(val || "")}</textarea>
        </div>`;
    }
    return "";
  }

  function renderIdentity() {
    return `
      <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
      <div class="sec-label">Final step &bull; ${TOTAL} of ${TOTAL}</div>
      <div class="sec-title">Would you like to put your name to this?</div>
      <div class="sec-desc">Entirely optional. If you leave your name, your response will no longer be anonymous — leadership will see your answers alongside your name. There is no expectation either way.</div>
      <div class="q-block">
        <div class="toggle-row" onclick="toggleName()">
          <div class="toggle-track${nameOn ? " on" : ""}"><div class="toggle-thumb"></div></div>
          <span class="toggle-label">${nameOn ? "Yes, include my name" : "Stay anonymous"}</span>
        </div>
        ${nameOn ? `
          <div class="name-fields">
            <input type="text" placeholder="Your name" value="${escHtml(answers["name_val"] || "")}" oninput="setA('name_val',this.value)" />
            <input type="text" placeholder="Your venue (optional)" value="${escHtml(answers["name_venue"] || "")}" oninput="setA('name_venue',this.value)" />
          </div>
          <div class="name-warn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            This response will no longer be anonymous.
          </div>` : ""}
      </div>
      <div id="error-box" class="error-box">Something went wrong submitting your response. Please try again, or contact hugo@bhgbali.com.</div>
      <div class="nav-row">
        <button class="btn-back" onclick="go(-1)">&#8592; Back</button>
        <button class="btn-next" id="submit-btn" onclick="submitSurvey()">
          ${submitting ? "Submitting..." : "Submit survey &#8594;"}
        </button>
      </div>`;
  }

  function renderDone() {
    return `
      <div class="done-wrap">
        <div class="done-icon">&#10003;</div>
        <div class="done-title">Thank you</div>
        <div class="done-sub">
          Your response has been recorded.<br><br>
          Feedback is reviewed seriously and directly shapes how BHG operates.
        </div>
      </div>`;
  }

  function toggleName() { nameOn = !nameOn; render(); }
  function setA(id, val) { answers[id] = val; }
  function toggleM(id, val) {
    if (!answers[id]) answers[id] = [];
    const i = answers[id].indexOf(val);
    if (i > -1) answers[id].splice(i, 1);
    else answers[id].push(val);
    render();
  }
  function go(dir) {
    cur = Math.max(0, cur + dir);
    render();
    window.scrollTo(0, 0);
  }
  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  async function submitSurvey() {
    if (submitting) return;
    submitting = true;
    const btn = document.getElementById("submit-btn");
    if (btn) { btn.disabled = true; btn.textContent = "Submitting..."; }

    const payload = {
      timestamp: new Date().toISOString(),
      survey_round: SURVEY_ROUND,
      anonymous: !nameOn,
      respondent_name: nameOn ? (answers["name_val"] || "") : "",
      respondent_venue_named: nameOn ? (answers["name_venue"] || "") : "",
      ...flattenAnswers()
    };

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      cur = TOTAL;
      render();
    } catch (e) {
      submitting = false;
      const errBox = document.getElementById("error-box");
      if (errBox) errBox.classList.add("show");
      if (btn) { btn.disabled = false; btn.innerHTML = "Retry &#8594;"; }
    }
  }

  function flattenAnswers() {
    const out = {};
    for (const [k, v] of Object.entries(answers)) {
      if (k === "name_val" || k === "name_venue") continue;
      out[k] = Array.isArray(v) ? v.join(", ") : (v || "");
    }
    return out;
  }

  // Delegated click handler — handles single, multi, scale via data attributes
  document.getElementById('app').addEventListener('click', function(e) {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const action = t.dataset.action;
    const id = t.dataset.id;
    const val = t.dataset.val;
    if (action === 'single') { 
      // Store as number if numeric, string otherwise
      const parsed = val !== '' && !isNaN(val) ? Number(val) : val;
      setA(id, parsed); render(); 
    }
    if (action === 'multi')  { toggleM(id, val); render(); }
  });

  render();
</script>
</body>
</html>
