<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>BHG Staff Sentiment Survey</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #D97757;
      --green-dark: #F0A98A;
      --green-light: #3a2418;
      --text-primary: #f5f5f5;
      --text-secondary: #b0b0b0;
      --text-tertiary: #808080;
      --border: #2a2a2a;
      --border-mid: #3a3a3a;
      --bg: #111111;
      --bg-secondary: #000000;
      --amber: #BA7517;
      --radius: 10px;
      --radius-sm: 6px;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .shell {
      max-width: 620px;
      margin: 0 auto;
    }

    /* Header */
    .site-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .site-header .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-primary);
    }
    .site-header .divider {
      height: 16px;
      width: 1px;
      background: var(--border);
    }
    .site-header .subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
    }
    .admin-link {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-tertiary);
      text-decoration: none;
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      padding: 5px 12px;
      transition: all 0.14s;
    }
    .admin-link:hover {
      color: var(--green);
      border-color: var(--green);
    }
    .lang-toggle {
      display: flex;
      align-items: center;
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      overflow: hidden;
      margin-left: 6px;
    }
    .lang-btn {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.14s;
    }
    .lang-btn.active {
      background: var(--green);
      color: #fff;
    }
    .lang-btn:hover:not(.active) {
      color: var(--text-primary);
    }

    /* Card */
    .card {
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 2rem;
    }

    /* Progress */
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 1.75rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 3px;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Section header */
    .sec-label {
      font-size: 11px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.3rem;
    }
    .sec-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }
    .sec-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 1.75rem;
    }

    /* Info box */
    .info-box {
      background: var(--green-light);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 13px;
      color: #F0A98A;
      margin-bottom: 1.75rem;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.55;
    }
    .info-box svg { flex-shrink: 0; margin-top: 1px; }

    /* Question block */
    .q-block {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .q-block:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .q-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }
    .q-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    /* Scale */
    .scale-row { display: flex; gap: 6px; }
    .scale-btn {
      flex: 1;
      padding: 9px 4px;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.14s;
      font-family: inherit;
    }
    .scale-btn { transition: all 0.14s; }
    .scale-btn:hover { background: var(--bg-secondary); border-color: var(--green); }
    .scale-btn.sel { background: var(--green); border-color: var(--green); color: #fff; transform: scale(1.12); font-weight: 700; }
    .scale-labels { display: flex; justify-content: space-between; margin-top: 6px; }
    .scale-labels span { font-size: 11px; color: var(--text-tertiary); }

    /* Single / multi choice */
    .choice-list { display: flex; flex-direction: column; gap: 8px; }
    .choice-btn {
      padding: 10px 14px;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 0.14s;
      font-family: inherit;
    }
    .choice-btn:hover { background: var(--bg-secondary); }
    .choice-btn.sel { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }

    /* Badge multi-select */
    .badge-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .badge {
      display: inline-block;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.14s;
      user-select: none;
    }
    .badge:hover { border-color: var(--green); color: var(--green-dark); }
    .badge.sel { background: var(--green-light); border-color: var(--green); color: var(--green-dark); font-weight: 500; }

    /* Text inputs */
    textarea, input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg);
      line-height: 1.5;
      transition: border-color 0.14s;
    }
    textarea { resize: vertical; min-height: 90px; }
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
    }

    /* Nav */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .btn-back {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-secondary);
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.14s;
    }
    .btn-back:hover { background: var(--bg-secondary); }
    .btn-next {
      background: var(--green);
      border: none;
      color: #fff;
      padding: 10px 26px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.14s;
    }
    .btn-next:hover { background: var(--green-dark); }
    .btn-next:disabled { background: var(--border); cursor: default; }

    /* Name toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 4px 0;
      user-select: none;
    }
    .toggle-track {
      width: 42px;
      height: 24px;
      background: var(--border-mid);
      border-radius: 12px;
      transition: background 0.2s;
      flex-shrink: 0;
      position: relative;
    }
    .toggle-track.on { background: var(--green); }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-track.on .toggle-thumb { left: 21px; }
    .toggle-label { font-size: 14px; color: var(--text-primary); }
    .name-fields { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .name-warn {
      font-size: 12px;
      color: var(--amber);
      margin-top: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* Submitting state */
    .submitting-msg {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Done */
    .done-wrap { text-align: center; padding: 2.5rem 1rem; }
    .done-icon { font-size: 48px; margin-bottom: 1rem; }
    .done-title { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 0.5rem; }
    .done-sub { font-size: 15px; color: var(--text-secondary); line-height: 1.7; }

    /* Error */
    .error-box {
      background: #FFF0F0;
      border: 1px solid #F09595;
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 13px;
      color: #A32D2D;
      margin-top: 1rem;
      display: none;
    }
    .error-box.show { display: block; }
    .validation-msg {
      background: rgba(216, 90, 48, 0.12);
      border: 1px solid var(--red);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 1.25rem;
    }
    .q-block.invalid .q-text {
      color: var(--red);
    }
    .comment-field-wrap {
      margin-top: 10px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .comment-field-wrap label {
      font-size: 12px;
      color: var(--amber);
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .comment-field-wrap textarea {
      min-height: 64px;
      border-color: var(--amber);
    }
    .comment-field-wrap textarea:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(186,117,23,0.15);
    }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem; }
      .scale-btn { font-size: 12px; padding: 8px 2px; }
    }
  </style>
</head>

      q_feedback:       "Saya menerima masukan yang berguna untuk membantu saya berkembang.",
      q_voice:          "Saya merasa nyaman menyampaikan kekhawatiran atau saran kepada supervisor saya.",
      q_mgmt_open:      "Ada hal tentang cara tim dikelola yang bisa lebih baik?",
      // Growth
      q_recognition:    "Ketika saya bekerja dengan baik, hal itu diperhatikan.",
      q_development:    "Saya memiliki kesempatan untuk berkembang dalam peran saya.",
      q_pay:            "Saya merasa kompensasi yang saya terima adil.",
      q_retention:      "Seberapa besar kemungkinan kamu masih bekerja di BHG dalam 12 bulan ke depan?",
      retention_opts:   ["Sangat mungkin","Mungkin","Tidak yakin","Tidak mungkin","Sangat tidak mungkin"],
      q_growth_open:    "Apa yang akan membuatmu lebih ingin tetap dan berkembang di BHG?",
      // Overall
      q_nps:            "Seberapa besar kemungkinan kamu merekomendasikan BHG sebagai tempat kerja kepada temanmu?",
      q_morale:         "Bagaimana kamu menggambarkan semangat tim di venumu saat ini?",
      morale_opts:      ["Sangat positif","Umumnya positif","Campur aduk","Umumnya rendah","Sangat rendah"],
      q_strength:       "Apa hal TERBAIK dari bekerja di BHG?",
      q_fix:            "Jika kamu bisa mengubah SATU hal di BHG, apa itu?",
    }
  };

  function t(key) { return T[lang][key] || T.en[key] || key; }
  function setLang(l) {
    lang = l;
    document.getElementById("btn-en").classList.toggle("active", l === "en");
    document.getElementById("btn-id").classList.toggle("active", l === "id");
    document.getElementById("subtitle-text").textContent = t("subtitle");
    render();
  } // overwritten by backend config on load
  const STORAGE_KEY = "bhg_survey_completed_" + SURVEY_ROUND.replace(/\s+/g, "_");
  function getStorageKey() { return "bhg_survey_completed_" + SURVEY_ROUND_LIVE.replace(/\s+/g, "_"); }
  // ──────────────────────────────────────────────────────────────────────────

  function hasAlreadyResponded() {
    try { return localStorage.getItem(getStorageKey()) === "true"; }
    catch(e) { return false; }
  }
  function markAsResponded() {
    try { localStorage.setItem(getStorageKey(), "true"); }
    catch(e) { /* localStorage unavailable, fail silently */ }
  }

  function getSections() {
    return [
      {
        id: "intro",
        label: t("sec_intro_label"),
        title: t("sec_intro_title"),
        desc:  t("sec_intro_desc"),
        questions: [
          { id: "venue",     type: "single", text: t("q_venue"), options: ["Masonry Canggu","Masonry Uluwatu","The Backroom","Bar Vera","Other"] },
          { id: "role_type", type: "single", text: t("q_dept"),  options: ["Floor","Bar","Kitchen","Housekeeping","Engineering","Cashier","Security","Steward","Management","Other"] },
          { id: "tenure",    type: "single", text: t("q_tenure"), options: t("tenure_opts") }
        ]
      },
      {
        id: "role",
        label: t("sec_role_label"),
        title: t("sec_role_title"),
        desc:  t("sec_role_desc"),
        questions: [
          { id: "role_clarity", type: "scale", text: t("q_role_clarity"), low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "workload",     type: "scale", text: t("q_workload"),     low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "tools",        type: "scale", text: t("q_tools"),        low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "pride",        type: "scale", text: t("q_pride"),        low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "role_open",    type: "text",  text: t("q_role_open"),    placeholder: t("optional_prompt") }
        ]
      },
      {
        id: "team",
        label: t("sec_team_label"),
        title: t("sec_team_title"),
        desc:  t("sec_team_desc"),
        questions: [
          { id: "peer_support", type: "scale", text: t("q_peer_support"), low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "respect",      type: "scale", text: t("q_respect"),      low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "belonging",    type: "scale", text: t("q_belonging"),    low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "comms",        type: "scale", text: t("q_comms"),        low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "team_open",    type: "text",  text: t("q_team_open"),    placeholder: t("optional_prompt") }
        ]
      },
      {
        id: "management",
        label: t("sec_mgmt_label"),
        title: t("sec_mgmt_title"),
        desc:  t("sec_mgmt_desc"),
        questions: [
          { id: "mgmt_support", type: "scale", text: t("q_mgmt_support"), low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "mgmt_fair",    type: "scale", text: t("q_mgmt_fair"),    low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "feedback",     type: "scale", text: t("q_feedback"),     low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "voice",        type: "scale", text: t("q_voice"),        low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "mgmt_open",    type: "text",  text: t("q_mgmt_open"),    placeholder: t("optional_prompt") }
        ]
      },
      {
        id: "growth",
        label: t("sec_growth_label"),
        title: t("sec_growth_title"),
        desc:  t("sec_growth_desc"),
        questions: [
          { id: "recognition", type: "scale",  text: t("q_recognition"), low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "development", type: "scale",  text: t("q_development"), low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "pay",         type: "scale",  text: t("q_pay"),         low: t("scale_low_agree"), high: t("scale_high_agree") },
          { id: "retention",   type: "single", text: t("q_retention"),   options: t("retention_opts") },
          { id: "growth_open", type: "text",   text: t("q_growth_open"), placeholder: t("optional_prompt") }
        ]
      },
      {
        id: "overall",
        label: t("sec_overall_label"),
        title: t("sec_overall_title"),
        desc:  t("sec_overall_desc"),
        questions: [
          { id: "nps",      type: "scale",  text: t("q_nps"),    low: t("scale_low_nps"), high: t("scale_high_nps"), max: 10 },
          { id: "morale",   type: "single", text: t("q_morale"), options: t("morale_opts") },
          { id: "strength", type: "text",   text: t("q_strength"), placeholder: t("optional_prompt") },
          { id: "fix",      type: "text",   text: t("q_fix"),      placeholder: t("optional_prompt") }
        ]
      },
      {
        id: "identity",
        label: t("identity_label"),
        title: t("identity_title"),
        desc:  t("identity_desc"),
        questions: []
      }
    ];
  }

  let cur = 0;
  let answers = {};
  let nameOn = false;
  let submitting = false;
  let showValidation = false;
  let invalidIds = [];

  function getSectionCount() { return getSections().length; }
  function pct() { return Math.round((cur / (getSectionCount() - 1)) * 100); }

  function getRequiredUnanswered(sec) {
    return sec.questions
      .filter(q => q.type !== "text")
      .filter(q => {
        const v = answers[q.id];
        if (q.type === "multi") return !v || v.length === 0;
        return v === undefined || v === null || v === "";
      })
      .map(q => q.id);
  }

  function render() {
    const el = document.getElementById("app");
    if (cur >= getSectionCount()) { el.innerHTML = renderDone(); return; }
    const sections = getSections();
    const TOTAL = getSectionCount();
    const sec = sections[cur];
    if (sec.id === "identity") { el.innerHTML = renderIdentity(); return; }

    const topNote = sec.id === "intro" ? `
      <div class="info-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>${t("anon_note")}</span>
      </div>` : "";

    const validationNote = showValidation && invalidIds.length > 0
      ? `<div class="validation-msg">${t("required_msg")}</div>`
      : "";

    const qHtml = sec.questions.map(q => renderQ(q)).join("");

    el.innerHTML = `
      <div class="progress-track"><div class="progress-fill" style="width:${pct()}%"></div></div>
      <div class="sec-label">${sec.label} &bull; ${cur + 1} of ${TOTAL}</div>
      <div class="sec-title">${sec.title}</div>
      <div class="sec-desc">${sec.desc}</div>
      ${topNote}${validationNote}${qHtml}
      <div class="nav-row">
        ${cur > 0
          ? `<button class="btn-back" onclick="go(-1)">&#8592; Back</button>`
          : `<span></span>`}
        <button class="btn-next" onclick="go(1)">
          ${cur === getSectionCount() - 2 ? t("review_btn") : t("continue_btn")} &#8594;
        </button>
      </div>`;
  }

  function renderQ(q) {
    const val = answers[q.id];
    const isInvalid = showValidation && invalidIds.includes(q.id);
    const reqMark = q.type !== "text" ? ` <span style="color:var(--red)">*</span>` : "";

    if (q.type === "scale") {
      const max = q.max || 5;
      const btns = Array.from({ length: max }, (_, i) => i + 1)
        .map(n => `<button class="scale-btn${val == n ? " sel" : ""}" data-action="single" data-id="${q.id}" data-val="${n}">${n}</button>`)
        .join("");
      const showComment = val !== undefined && val !== null && val <= 2 && q.max !== 10;
      const commentId = q.id + "_comment";
      const commentVal = answers[commentId] || "";
      const commentField = showComment ? `
        <div class="comment-field-wrap">
          <label>${t("low_score_prompt")}</label>
          <textarea placeholder="${t('low_score_ph')}" oninput="setA('${commentId}',this.value)">${escHtml(commentVal)}</textarea>
        </div>` : "";
      return `
        <div class="q-block${isInvalid ? " invalid" : ""}">
          <div class="q-text">${q.text}${reqMark}</div>
          <div class="scale-row">${btns}</div>
          <div class="scale-labels">
            <span>${max !== 10 ? "😕 " : ""}${q.low}</span>
            <span>${q.high}${max !== 10 ? " 😊" : ""}</span>
          </div>
          ${commentField}
        </div>`;
    }
    if (q.type === "single") {
      const opts = q.options.map(o =>
        `<button class="choice-btn${val === o ? " sel" : ""}" data-action="single" data-id="${q.id}" data-val="${o.replace(/"/g,'&quot;')}">${o}</button>`
      ).join("");
      return `
        <div class="q-block${isInvalid ? " invalid" : ""}">
          <div class="q-text">${q.text}${reqMark}</div>
          <div class="choice-list">${opts}</div>
        </div>`;
    }
    if (q.type === "multi") {
      const valArr = val || [];
      const badges = q.options.map(o =>
        `<span class="badge${valArr.includes(o) ? " sel" : ""}" data-action="multi" data-id="${q.id}" data-val="${o.replace(/"/g,'&quot;')}">${o}</span>`
      ).join("");
      return `
        <div class="q-block${isInvalid ? " invalid" : ""}">
          <div class="q-text">${q.text}${reqMark}</div>
          ${q.note ? `<div class="q-sub">${q.note}</div>` : ""}
          <div class="badge-wrap">${badges}</div>
        </div>`;
    }
    if (q.type === "text") {
      return `
        <div class="q-block">
          <div class="q-text">${q.text}</div>
          <textarea placeholder="${q.placeholder || ""}" oninput="setA('${q.id}',this.value)">${escHtml(val || "")}</textarea>
        </div>`;
    }
    return "";
  }

  function renderIdentity() {
    return `
      <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
      <div class="sec-label">Final step &bull; ${TOTAL} of ${TOTAL}</div>
      <div class="sec-title">Would you like to put your name to this?</div>
      <div class="sec-desc">Entirely optional. If you leave your name, your response will no longer be anonymous — leadership will see your answers alongside your name. There is no expectation either way.</div>
      <div class="q-block">
        <div class="toggle-row" onclick="toggleName()">
          <div class="toggle-track${nameOn ? " on" : ""}"><div class="toggle-thumb"></div></div>
          <span class="toggle-label">${nameOn ? t("toggle_named") : t("toggle_anon")}</span>
        </div>
        ${nameOn ? `
          <div class="name-fields">
            <input type="text" placeholder="${t('name_ph')}" value="${escHtml(answers["name_val"] || "")}" oninput="setA('name_val',this.value)" />
            <input type="text" placeholder="${t('venue_ph')}" value="${escHtml(answers["name_venue"] || "")}" oninput="setA('name_venue',this.value)" />
          </div>
          <div class="name-warn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            This response will no longer be anonymous.
          </div>` : ""}
      </div>
      <div id="error-box" class="error-box">Something went wrong submitting your response. Please try again, or contact hugo@bhgbali.com.</div>
      <div class="nav-row">
        <button class="btn-back" onclick="go(-1)">&#8592; Back</button>
        <button class="btn-next" id="submit-btn" onclick="submitSurvey()">
          ${submitting ? "..." : t("submit_btn") + " &#8594;"}
        </button>
      </div>`;
  }

  function renderDone() {
    return `
      <div class="done-wrap">
        <div class="done-icon">&#10084;</div>
        <div class="done-title">${t("done_title")}</div>
        <div class="done-sub">
          ${t("done_sub").replace(/\n/g,"<br>")}<br><br>
          <span style="font-size:13px;color:var(--text-tertiary)">${t("done_sign")}</span>
        </div>
      </div>`;
  }

  function renderAlreadyResponded() {
    return `
      <div class="done-wrap">
        <div class="done-icon">&#10003;</div>
        <div class="done-title">${t("already_title")}</div>
        <div class="done-sub">
          ${t("already_sub")}<br><br>
          This survey runs quarterly. We'll let you know when the next round opens.
        </div>
      </div>`;
  }

  function toggleName() { nameOn = !nameOn; render(); }
  function setA(id, val) { answers[id] = val; }
  function toggleM(id, val) {
    if (!answers[id]) answers[id] = [];
    const i = answers[id].indexOf(val);
    if (i > -1) answers[id].splice(i, 1);
    else answers[id].push(val);
    render();
  }
  function go(dir) {
    if (dir > 0 && cur < getSectionCount() && getSections()[cur].id !== "identity") {
      const unanswered = getRequiredUnanswered(getSections()[cur]);
      if (unanswered.length > 0) {
        showValidation = true;
        invalidIds = unanswered;
        render();
        return;
      }
    }
    showValidation = false;
    invalidIds = [];
    cur = Math.max(0, cur + dir);
    render();
    window.scrollTo(0, 0);
  }
  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  async function submitSurvey() {
    if (submitting) return;
    submitting = true;
    const btn = document.getElementById("submit-btn");
    if (btn) { btn.disabled = true; btn.textContent = "Submitting..."; }

    const payload = {
      timestamp: new Date().toISOString(),
      survey_round: SURVEY_ROUND_LIVE,
      anonymous: !nameOn,
      respondent_name: nameOn ? (answers["name_val"] || "") : "",
      respondent_venue_named: nameOn ? (answers["name_venue"] || "") : "",
      ...flattenAnswers()
    };

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      markAsResponded();
      cur = TOTAL;
      render();
    } catch (e) {
      submitting = false;
      const errBox = document.getElementById("error-box");
      if (errBox) errBox.classList.add("show");
      if (btn) { btn.disabled = false; btn.innerHTML = "Retry &#8594;"; }
    }
  }

  function flattenAnswers() {
    const out = {};
    for (const [k, v] of Object.entries(answers)) {
      if (k === "name_val" || k === "name_venue") continue;
      out[k] = Array.isArray(v) ? v.join(", ") : (v || "");
    }
    return out;
  }

  // Delegated click handler — handles single, multi, scale via data attributes
  document.getElementById('app').addEventListener('click', function(e) {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const action = t.dataset.action;
    const id = t.dataset.id;
    const val = t.dataset.val;
    if (action === 'single') { 
      // Store as number if numeric, string otherwise
      const parsed = val !== '' && !isNaN(val) ? Number(val) : val;
      setA(id, parsed);
      // Clear any low-score comment if rating has moved above 2
      if (typeof parsed === 'number' && parsed > 2) {
        delete answers[id + "_comment"];
      }
      invalidIds = invalidIds.filter(x => x !== id);
      render(); 
    }
    if (action === 'multi')  { 
      toggleM(id, val); 
      invalidIds = invalidIds.filter(x => x !== id);
      render(); 
    }
  });

  // ── Closed screen ────────────────────────────────────────────────────────
  function renderClosed(message) {
    return `
      <div class="done-wrap">
        <div class="done-icon" style="font-size:36px;color:var(--text-tertiary)">&#9632;</div>
        <div class="done-title">${t("closed_title")}</div>
        <div class="done-sub">${message || "This survey round is currently closed."}</div>
      </div>`;
  }

  // ── Init — check open/closed status from backend before rendering ─────────
  (async function init() {
    const app = document.getElementById("app");

    // Show a brief loading state
    app.innerHTML = `<div style="text-align:center;padding:3rem 0;color:var(--text-tertiary);font-size:14px;">Loading...</div>`;

    try {
      const res    = await fetch(SCRIPT_URL + "?action=config");
      const config = await res.json();

      // Sync survey round from backend so no manual file edit is needed each quarter
      if (config.survey_round) {
        SURVEY_ROUND_LIVE = config.survey_round;
      }

      if (!config.survey_open) {
        app.innerHTML = renderClosed(config.closed_message);
        return;
      }
    } catch (e) {
      // If config fetch fails (network error etc), allow the form to load anyway
      // so staff aren't blocked by a transient backend issue
    }

    if (hasAlreadyResponded()) {
      app.innerHTML = renderAlreadyResponded();
    } else {
      render();
    }
  })();
</script>
</body>
</html>
